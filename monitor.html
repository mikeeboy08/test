<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Monitor | WCGNHS</title>
    <link rel="icon" type="image/png" href="WCGNHS.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e3a8a; }
        .card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; }
        th { background-color: #f1f5f9; color: #475569; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.1em; font-weight: 800; }
        .loader { border-top-color: #2563eb; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .search-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* Hidden main content until initialized */
        #monitor-content { display: none; }

        /* Initialization Screen Overlay */
        #init-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e3a8a, #172554);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="init-screen">
        <img src="WCGNHS.png" alt="Logo" class="h-24 w-24 mb-6 animate-pulse">
        <h1 class="text-3xl font-black uppercase tracking-tighter mb-2">Faculty <span class="text-blue-400">Monitor</span></h1>
        <p class="text-blue-200 text-sm mb-8 px-6 font-semibold">Click to activate live monitor and enter fullscreen mode.</p>
        <button onclick="launchMonitor()" class="bg-white text-blue-900 px-12 py-4 rounded-2xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-transform hover:bg-blue-50">
            Activate Monitor
        </button>
    </div>

    <div id="monitor-content">
        <div class="max-w-6xl mx-auto mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <img src="WCGNHS.png" alt="WCGNHS Logo" class="h-14 w-auto object-contain">
                <div>
                    <h1 class="text-3xl font-black text-blue-900 tracking-tighter uppercase">Faculty<span class="text-blue-600">Monitor</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Live Attendance Feed</p>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-1 max-w-2xl items-center gap-3">
                <div class="relative flex-1">
                    <input type="text" id="nameSearch" oninput="applyFilters()" placeholder="Search student name..." 
                        class="search-input w-full bg-white border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold text-blue-900 outline-none transition-all pl-11">
                    <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <button onclick="fetchData(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-bold text-sm transition-all shadow-lg flex items-center gap-2 active:scale-95 whitespace-nowrap">
                    REFRESH FEED
                </button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto card rounded-3xl p-6 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Search Date</label>
                <input type="date" id="filterDate" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Grade & Section</label>
                <select id="filterSection" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Sections</option>
                    <option>Grade 7 - ALEXANDRITE</option>
                    <option>Grade 7 - RUBY</option>
                    <option>Grade 8 - AQUAMARINE</option>
                    <option>Grade 8 - DIAMOND</option>
                    <option>Grade 9 - AMETHYST</option>
                    <option>Grade 9 - MOONSTONE</option>
                    <option>Grade 10 - EMERALD</option>
                    <option>Grade 10 - JADE</option>
                    <option>Grade 11 - ABM</option>
                    <option>Grade 11 - HUMSS</option>
                    <option>Grade 11 - TVL</option>
                    <option>Grade 12 - ABM</option>
                    <option>Grade 12 - HUMSS</option>
                    <option>Grade 12 - TVL</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Subject</label>
                <select id="filterSubject" onchange="applyFilters()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Subjects</option>
                    <option>ENGLISH</option>
                    <option>MATHEMATICS</option>
                    <option>SCIENCE</option>
                    <option>FILIPINO</option>
                    <option>ARALING PANLIPUNAN</option>
                    <option>MAPEH</option>
                    <option>TLE</option>
                    <option>VALUES EDUCATION</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="resetFilters()" class="w-full py-3 text-xs font-black text-slate-400 hover:text-blue-600 transition-colors uppercase tracking-widest">Clear Filters</button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto card rounded-3xl p-2 relative min-h-[400px]">
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex items-center justify-center rounded-3xl">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10"></div>
            </div>

            <div class="table-container">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-100">
                            <th class="px-6 py-5 rounded-tl-2xl">Log Time</th>
                            <th class="px-6 py-5">Student / ID</th>
                            <th class="px-6 py-5">Grade & Section</th>
                            <th class="px-6 py-5">Subject</th>
                            <th class="px-6 py-5 text-center rounded-tr-2xl">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-semibold text-slate-600"></tbody>
                </table>
            </div>
            <div id="noData" class="hidden py-24 text-center">
                <p class="text-slate-300 font-black uppercase tracking-[0.2em] text-xs">No records found for this criteria</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxU7NV51MzdNtixqBAVXmNnET4K4FmdUeluDmflwMmVrC_mOJf2LOC0aTQVmhxrz5i3/exec";
        let masterData = [];

        // --- Fullscreen Utility ---
        function enterFullscreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
        }

        // --- System Launch ---
        function launchMonitor() {
            enterFullscreen();
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('monitor-content').style.display = 'block';
            fetchData(true);
            
            // Start auto-refresh interval
            setInterval(() => fetchData(false), 10000);
        }

        function getValue(obj, possibleKeys) {
            for (let key of possibleKeys) {
                let found = Object.keys(obj).find(k => 
                    k.toLowerCase().replace(/[^a-z0-9]/g, '') === key.toLowerCase().replace(/[^a-z0-9]/g, '')
                );
                if (found) return obj[found];
            }
            return "N/A";
        }

        function formatTimestamp(ts) {
            if (!ts || ts === 'N/A') return '---';
            const date = new Date(ts);
            if (isNaN(date.getTime())) return ts;
            return new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Manila',
                month: 'short', day: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: true
            }).format(date);
        }

        async function fetchData(showLoader = false) {
            const loader = document.getElementById('loadingOverlay');
            if (showLoader) loader.classList.remove('hidden');
            
            try {
                const response = await fetch(SCRIPT_URL);
                masterData = await response.json();
                applyFilters();
            } catch (e) {
                console.error("Fetch Error:", e);
            } finally {
                if (showLoader) loader.classList.add('hidden');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');
            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            const sortedData = [...data].reverse();

            sortedData.forEach(item => {
                const student = getValue(item, ["studentinformation", "studentId", "id"]);
                const section = getValue(item, ["grade&section", "grade", "section"]);
                const subject = getValue(item, ["subject"]);
                const status = getValue(item, ["status"]);
                const time = formatTimestamp(getValue(item, ["timestamp"]));

                const statusColor = status === "Time In" ? "bg-emerald-50 text-emerald-600 border-emerald-100" : "bg-rose-50 text-rose-600 border-rose-100";

                const row = `
                    <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 font-mono text-[10px] text-slate-400">${time}</td>
                        <td class="px-6 py-4 font-bold text-blue-900">${student}</td>
                        <td class="px-6 py-4 text-slate-500 text-xs">${section}</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase">${subject}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1.5 rounded-xl text-[9px] font-black border uppercase ${statusColor}">${status}</span>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function applyFilters() {
            const dateVal = document.getElementById('filterDate').value;
            const sectionVal = document.getElementById('filterSection').value;
            const subjectVal = document.getElementById('filterSubject').value;
            const searchVal = document.getElementById('nameSearch').value.toLowerCase();

            const filtered = masterData.filter(item => {
                const student = getValue(item, ["studentinformation", "studentId", "id"]).toString().toLowerCase();
                
                let dateMatch = true;
                if(dateVal) {
                    const itemDate = new Date(getValue(item, ["timestamp"])).toLocaleDateString('en-CA');
                    dateMatch = (itemDate === dateVal);
                }
                
                const sectionMatch = sectionVal === "" || getValue(item, ["grade&section"]) === sectionVal;
                const subjectMatch = subjectVal === "" || getValue(item, ["subject"]) === subjectVal;
                const searchMatch = searchVal === "" || student.includes(searchVal);

                return dateMatch && sectionMatch && subjectMatch && searchMatch;
            });

            renderTable(filtered);
        }

        function resetFilters() {
            document.getElementById('filterDate').value = "";
            document.getElementById('filterSection').value = "";
            document.getElementById('filterSubject').value = "";
            document.getElementById('nameSearch').value = "";
            renderTable(masterData);
        }
    </script>
</body>
</html>
